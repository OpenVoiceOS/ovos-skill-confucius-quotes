name: Coverage Report
on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  coverage:
    uses: OpenVoiceOS/gh-automations/.github/workflows/coverage.yml@dev
    secrets: inherit
    with:
      python_version: "3.11"
      system_deps: 'swig'
      coverage_source: "ovos_skill_confucius_quotes"
      min_coverage: 80
      pr_comment: true

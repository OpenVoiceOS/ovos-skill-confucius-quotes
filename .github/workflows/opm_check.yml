name: OPM Plugin Check
on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  opm_check:
    uses: OpenVoiceOS/gh-automations/.github/workflows/opm-check.yml@dev
    secrets: inherit
    with:
      system_deps: 'swig'
      plugin_type: "skill"
      opm_require_found: true
      opm_validate_interface: true
      opm_test_import: true
      opm_perf_threshold_ms: 500
